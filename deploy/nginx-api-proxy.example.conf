# Exemplo: Nginx na porta 80 — SPA estático + proxy para o Express (Node) na 8080
# ---------------------------------------------------------------------------
# Coloque blocos de location da API *antes* do location / que faz try_files → index.html.
# Ajuste 127.0.0.1:8080 para onde o Node escuta (ou nome do serviço Docker).
#
# Isto resolve 405 em POST /system-settings/branding quando o pedido ia só para o root estático.
# A lista abaixo cobre prefixos comuns; se alguma rota REST devolver HTML do React, acrescente o prefixo.
#
# Variáveis típicas do proxy (cookies / IP):
#   proxy_set_header Host $host;
#   proxy_set_header X-Real-IP $remote_addr;
#   proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#   proxy_set_header X-Forwarded-Proto $scheme;
#
# WebSocket (Socket.io):
#   proxy_http_version 1.1;
#   proxy_set_header Upgrade $http_upgrade;
#   proxy_set_header Connection "upgrade";

upstream coreflow_node {
    server 127.0.0.1:8080;
}

# --- API (Express) — ordem: mais específico / regex antes do SPA ---

location ^~ /system-settings {
    proxy_pass http://coreflow_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /auth {
    proxy_pass http://coreflow_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /public {
    proxy_pass http://coreflow_node;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /socket.io {
    proxy_pass http://coreflow_node;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /platform {
    proxy_pass http://coreflow_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

location ^~ /companies {
    proxy_pass http://coreflow_node;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}

